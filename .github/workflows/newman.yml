name: Newman Contract Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  newman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Lint contracts
        run: npm run lint:contracts

      - name: Start mock servers
        run: |
          nohup npm run mock:iot > prism-iot.log 2>&1 &
          nohup npm run mock:vision > prism-vision.log 2>&1 &
          sleep 20

      - name: Verify servers
        run: |
          curl --fail http://127.0.0.1:4010/health
          curl --fail http://127.0.0.1:4011/health

      - name: Run Newman
        run: npm run test:mock

      - name: Show logs
        if: failure()
        run: |
          echo "=== IOT ==="
          cat prism-iot.log || true
          echo "=== VISION ==="
          cat prism-vision.log || true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: reports/