name: Newman Contract Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  newman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Lint OpenAPI contracts
        run: npm run lint:contracts

      - name: Start Prism mock servers
        run: |
          nohup npm run mock:iot > prism-iot.log 2>&1 &
          nohup npm run mock:vision > prism-vision.log 2>&1 &
          sleep 20

      - name: Verify servers started
        run: |
          cat prism-iot.log || true
          cat prism-vision.log || true

          curl --retry 20 --retry-delay 3 http://127.0.0.1:4010/health
          curl --retry 20 --retry-delay 3 http://127.0.0.1:4011/health

      - name: Wait for ports
        run: |
          npx wait-on tcp:4010 tcp:4011 --timeout 180000

      - name: Run Newman tests
        run: npm run test:mock

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== IOT LOG ==="
          cat prism-iot.log || true

          echo "=== VISION LOG ==="
          cat prism-vision.log || true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/